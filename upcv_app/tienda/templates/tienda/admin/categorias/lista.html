{% extends 'tienda/admin/_base_admin_tienda.html' %}{% block tienda_admin_content %}<div class="d-flex justify-content-between"><h3>Categorías</h3><a class="btn btn-primary" href="{% url 'tienda:admin_categoria_crear' %}">Crear</a></div><div class="card mt-3"><table class="table"><tr><th>Nombre</th><th>Slug</th><th>Activo</th><th>Orden</th><th></th></tr>{% for i in items %}<tr><td>{{ i.nombre }}</td><td>{{ i.slug }}</td><td>{{ i.activo|yesno:'Sí,No' }}</td><td>{{ i.orden }}</td><td><a class="btn btn-sm btn-warning" href="{% url 'tienda:admin_categoria_editar' i.id %}">Editar</a></td></tr>{% endfor %}</table></div>{% endblock %}
