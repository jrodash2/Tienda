{% extends 'almacen/base.html' %}
{% block content %}
<div class="page-body">
  <div class="container-fluid py-4">
    <div class="card mb-3">
      <div class="card-body d-flex flex-wrap gap-2 align-items-center">
        <strong class="me-2">Tienda en línea</strong>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'tienda:admin_dashboard' %}">Dashboard</a>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'tienda:admin_productos' %}">Productos</a>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'tienda:admin_pedidos' %}">Pedidos</a>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'tienda:admin_ubicaciones_tienda' %}">Ubicaciones de tienda</a>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'tienda:admin_cuentas_bancarias' %}">Cuentas bancarias</a>
      </div>
    </div>
    {% if messages %}{% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">{{ message }}<button class="btn-close" data-bs-dismiss="alert"></button></div>{% endfor %}{% endif %}
    {% block tienda_admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
